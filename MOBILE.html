<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Registro Allenamenti</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght=500;600;700&family=Inter:wght=400;500;600&family=Space+Mono:wght=400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg: #141816;
    --board: #1D2320;
    --board-alt: #232A26;
    --line: rgba(242,240,233,0.13);
    --chalk: #F2F0E9;
    --chalk-dim: #98A199;
    --orange: #FF7A45;
    --orange-dim: rgba(255,122,69,0.15);
    --teal: #2FC7A3;
    --teal-dim: rgba(47,199,163,0.15);
    --yellow: #F2C14E;
    --red: #E1615C;
    --radius: 12px;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html,body{ margin:0; padding:0; width: 100%; overflow-x: hidden; }
  body{
    background: var(--bg);
    color: var(--chalk);
    font-family: 'Inter', sans-serif;
    min-height:100vh;
    background-image:
      radial-gradient(circle at 15% 10%, rgba(255,255,255,0.02), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(255,255,255,0.02), transparent 40%);
  }
  .app{ max-width: 880px; margin: 0 auto; padding: 16px 12px 60px; }

  /* Header */
  .topbar{ margin-bottom: 16px; text-align: center; }
  .topbar h1{
    font-family:'Oswald', sans-serif;
    font-size: 26px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin: 0;
    font-weight: 700;
  }
  .topbar .subtitle{
    margin: 4px 0 0;
    color: var(--chalk-dim);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .topbar .subtitle span.o{ color: var(--orange); }
  .topbar .subtitle span.t{ color: var(--teal); }

  /* Tabs */
  .tabs-container {
    margin-left: -12px;
    margin-right: -12px;
    overflow-x: auto;
    display: flex;
    border-bottom: 1px solid var(--line);
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .tabs-container::-webkit-scrollbar { display: none; }

  .tabs{
    display:flex;
    white-space: nowrap;
    padding: 0 12px;
    width: 100%;
  }
  .tab{
    background:none;
    border:none;
    color: var(--chalk-dim);
    font-family:'Oswald', sans-serif;
    font-size: 14px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 12px 14px;
    cursor:pointer;
    border-bottom: 3px solid transparent;
    transition: color .15s ease, border-color .15s ease;
    flex: 1 0 auto;
    text-align: center;
  }
  .tab:hover{ color: var(--chalk); }
  .tab.active{ color: var(--chalk); }
  .tab[data-tab="corsa"].active{ border-color: var(--orange); }
  .tab[data-tab="crossfit"].active{ border-color: var(--teal); }
  .tab[data-tab="stats"].active{ border-color: var(--orange); }
  .tab[data-tab="massimali"].active{ border-color: var(--yellow); }

  .tab-panel{ display:none; animation: fadeIn .2s ease; margin-top: 16px; }
  .tab-panel.active{ display:block; }
  @keyframes fadeIn{ from{ opacity:0; transform: translateY(4px);} to{opacity:1; transform:none;} }

  /* Board / card */
  .board{
    background: var(--board);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
    position: relative;
  }

  .board h2{
    font-family:'Oswald', sans-serif;
    font-size: 16px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin: 0 0 14px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .dot{ width:8px; height:8px; border-radius:50%; display:inline-block; }
  .dot.orange{ background: var(--orange); }
  .dot.teal{ background: var(--teal); }
  .dot.yellow{ background: var(--yellow); }

  /* Forms */
  .form-grid{
    display:grid;
    grid-template-columns: 1fr;
    gap: 12px;
    margin-bottom: 14px;
  }
  @media(min-width: 480px) {
    .form-grid { grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); }
  }

  label{
    display:block;
    font-size: 11px;
    letter-spacing: .6px;
    text-transform: uppercase;
    color: var(--chalk-dim);
    margin-bottom: 5px;
  }
  input, select, textarea{
    width: 100%;
    background: var(--board-alt);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--chalk);
    padding: 10px 12px;
    font-family: 'Inter', sans-serif;
    font-size: 16px;
  }
  input:focus, select:focus, textarea:focus{
    outline: none;
    border-color: var(--chalk-dim);
  }
  textarea{ resize: vertical; min-height: 60px; }
  .mono-input{ font-family:'Space Mono', monospace; }

  /* Checkbox Custom Style */
  .checkbox-container {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 6px;
    cursor: pointer;
    user-select: none;
  }
  .checkbox-container input {
    width: 18px;
    height: 18px;
    cursor: pointer;
    accent-color: var(--yellow);
  }
  .checkbox-label {
    font-size: 12px;
    color: var(--chalk);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  button.primary{
    font-family:'Oswald', sans-serif;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-size: 14px;
    border:none;
    border-radius: 8px;
    padding: 12px 20px;
    cursor:pointer;
    color: #12140F;
    font-weight: 600;
    width: 100%;
    display: block;
    text-align: center;
    transition: filter .15s ease;
  }
  @media(min-width: 480px) {
    button.primary { width: auto; display: inline-block; }
  }
  .btn-orange{ background: var(--orange); }
  .btn-teal{ background: var(--teal); }
  .btn-yellow{ background: var(--yellow); }

  button.ghost{
    background: none;
    border: 1px dashed var(--line);
    color: var(--chalk-dim);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    cursor:pointer;
    font-family:'Inter', sans-serif;
    width: 100%;
    text-align: center;
  }
  @media(min-width: 480px) {
    button.ghost { width: auto; }
  }

  button.icon-btn{
    background:none;
    border:none;
    color: var(--red);
    cursor:pointer;
    font-size: 20px;
    padding: 8px 12px;
    line-height:1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  button.icon-btn.edit-btn { color: var(--yellow); }

  /* Wod Block */
  .wod-block {
    background: rgba(0,0,0,0.2);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 12px;
    position: relative;
  }
  .wod-block-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    gap: 8px;
  }
  .wod-block-header .remove-block-btn {
    font-size: 12px;
    color: var(--red);
    background: none;
    border: none;
    padding: 6px 0;
    cursor: pointer;
  }

  .exercise-row{
    display:grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 6px;
    margin-bottom: 8px;
    align-items: center;
  }

  /* Liste Entry Storico */
  .entry-list{ display:flex; flex-direction:column; gap:10px; }
  .entry{
    background: var(--board-alt);
    border: 1px solid var(--line);
    border-radius: 9px;
    padding: 12px;
  }
  .entry-top{
    display:flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .entry-date{
    font-family:'Space Mono', monospace;
    font-size: 13px;
    color: var(--chalk-dim);
  }
  
  .entry-stats{
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-top: 10px;
    font-family:'Space Mono', monospace;
    font-size: 13px;
    background: rgba(0,0,0,0.1);
    padding: 8px;
    border-radius: 6px;
  }
  @media(min-width: 480px) {
    .entry-stats { display: flex; flex-wrap: wrap; gap: 16px; background: none; padding: 0; }
  }
  .entry-stats .stat-label{
    color: var(--chalk-dim);
    font-family:'Inter', sans-serif;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .5px;
    display:block;
    margin-bottom: 2px;
  }

  .badge{
    font-family:'Oswald', sans-serif;
    font-size: 10px;
    letter-spacing: .8px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 20px;
    font-weight: 600;
  }
  .badge.fortime{ background: var(--orange-dim); color: var(--orange); }
  .badge.amrap{ background: var(--teal-dim); color: var(--teal); }
  .badge.emom{ background: rgba(242,193,78,0.15); color: var(--yellow); }
  .badge.chipper{ background: rgba(255,255,255,0.1); color: var(--chalk); }

  .single-wod-display {
    border-left: 2px solid var(--teal);
    padding-left: 8px;
    margin-top: 10px;
    margin-bottom: 10px;
  }
  .single-wod-display:last-child { margin-bottom: 0; }

  .wod-desc{ margin: 4px 0 6px; font-size: 14px; color: var(--chalk); white-space: pre-line; }
  .exercise-list{ list-style:none; padding:0; margin: 4px 0; display:flex; flex-direction:column; gap:4px; }
  .exercise-list li{
    font-size: 13px;
    display:flex;
    gap: 6px;
    align-items:baseline;
  }
  .exercise-list li::before{
    content:'●';
    color: var(--teal);
    font-size: 7px;
  }
  .ex-name{ font-weight: 600; color: var(--chalk); }
  .ex-note{ color: var(--chalk-dim); font-size: 12px; font-style: italic; }

  .empty-state{ text-align:center; padding: 24px 10px; color: var(--chalk-dim); font-size: 13px; }

  /* Carte Statistiche */
  .stat-cards{
    display:grid;
    grid-template-columns: 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  @media(min-width: 400px) {
    .stat-cards { grid-template-columns: repeat(3, 1fr); }
  }
  .stat-card{
    background: var(--board-alt);
    border: 1px solid var(--line);
    border-radius: 9px;
    padding: 12px;
    text-align:center;
  }
  .stat-card .big{
    font-family:'Space Mono', monospace;
    font-size: 20px;
    color: var(--chalk);
    display:block;
  }
  .stat-card .lbl{
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: var(--chalk-dim);
    margin-top: 3px;
    display:block;
  }
  .chart-wrap{ overflow-x:auto; margin-top: 10px; background: rgba(0,0,0,0.1); padding: 8px; border-radius: 8px; }

  /* Tabella Massimali Responsive */
  .table-responsive-container {
    width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    margin-top: 10px;
    border-radius: 8px;
    border: 1px solid var(--line);
  }
  .pr-table {
    width: 100%;
    border-collapse: collapse;
    min-width: 600px;
  }
  .pr-table th, .pr-table td {
    padding: 12px 10px;
    text-align: left;
    border-bottom: 1px solid var(--line);
    font-size: 13px;
  }
  .pr-table th {
    font-family: 'Oswald', sans-serif;
    text-transform: uppercase;
    color: var(--chalk-dim);
    background: var(--board-alt);
  }
  .pr-table td.weight-cell {
    font-family: 'Space Mono', monospace;
    color: var(--chalk);
  }
  .pr-table td.rm-cell {
    font-family: 'Space Mono', monospace;
    color: var(--yellow);
    font-weight: 600;
  }
  .pr-table td.date-cell {
    font-family: 'Space Mono', monospace;
    color: var(--chalk-dim);
    font-size: 12px;
  }

  .info-context {
    font-size: 11px;
    color: var(--chalk-dim);
    margin-top: 2px;
    display: block;
  }
</style>
</head>
<body>
<div class="app">

  <header class="topbar">
    <h1>Registro Allenamenti</h1>
    <p class="subtitle"><span class="o">Corsa</span> &nbsp;&middot;&nbsp; <span class="t">Crossfit</span></p>
  </header>

  <div class="tabs-container">
    <nav class="tabs">
      <button class="tab active" data-tab="corsa">Corsa</button>
      <button class="tab" data-tab="crossfit">Crossfit</button>
      <button class="tab" data-tab="stats">Statistiche</button>
      <button class="tab" data-tab="massimali">Massimali & Forza</button>
    </nav>
  </div>

  <main>
    <section id="tab-corsa" class="tab-panel active">
      <div class="board">
        <h2><span class="dot orange"></span>Nuova corsa</h2>
        <form id="runForm">
          <div class="form-grid">
            <div>
              <label for="runDate">Data</label>
              <input type="date" id="runDate" required>
            </div>
            <div>
              <label for="runKm">Km</label>
              <input type="number" id="runKm" step="0.01" min="0" placeholder="10.5" required>
            </div>
            <div>
              <label for="runPace">Passo medio (min/km)</label>
              <input type="text" id="runPace" class="mono-input" placeholder="5:30" pattern="^\d{1,2}:\d{2}$">
            </div>
            <div>
              <label for="runHr">Battiti medi (bpm)</label>
              <input type="number" id="runHr" min="0" placeholder="150">
            </div>
            <div>
              <label for="runCal">Calorie</label>
              <input type="number" id="runCal" min="0" placeholder="620">
            </div>
          </div>
          <button type="submit" class="primary btn-orange">Salva allenamento</button>
        </form>
      </div>

      <div class="board">
        <h2><span class="dot orange"></span>Storico corse</h2>
        <div id="runList" class="entry-list"></div>
      </div>
    </section>

    <section id="tab-crossfit" class="tab-panel">
      <div class="board">
        <h2 id="wodFormTitle"><span class="dot teal"></span>Nuova Sessione CrossFit</h2>
        <form id="wodForm">
          <input type="hidden" id="wodEditingId" value="">

          <div style="margin-bottom: 14px;">
            <label for="wodDate">Data Sessione</label>
            <input type="date" id="wodDate" required style="max-width: 100%;">
          </div>

          <div id="wodBlocksContainer"></div>
          
          <button type="button" id="addWodBlockBtn" class="ghost" style="margin-bottom: 16px; display: block; width: 100%;">+ Aggiungi un altro WOD a questo giorno</button>

          <div style="margin-bottom: 14px;">
            <label for="wodNotes">Note della Giornata (Opzionale)</label>
            <textarea id="wodNotes" placeholder="Sensazioni generali..."></textarea>
          </div>

          <div style="display: flex; flex-direction: column; gap: 10px;">
            <button type="submit" id="wodSubmitBtn" class="primary btn-teal">Salva Sessione</button>
            <button type="button" id="wodCancelEditBtn" class="ghost">Annulla Modifica</button>
          </div>
        </form>
      </div>

      <div class="board">
        <h2><span class="dot teal"></span>Storico CrossFit</h2>
        <div id="wodList" class="entry-list"></div>
      </div>
    </section>

    <section id="tab-stats" class="tab-panel">
      <div class="board">
        <h2><span class="dot orange"></span>Riepilogo Totale</h2>
        <div id="runStats"></div>
      </div>
      <div class="board">
        <h2><span class="dot orange"></span>Andamento Distanze (Km)</h2>
        <div id="runChartContainer"></div>
      </div>
    </section>

    <section id="tab-massimali" class="tab-panel">
      <div class="board">
        <h2 id="pbFormTitle"><span class="dot yellow"></span>Nuovo Record / Forza</h2>
        <form id="pbManualForm">
          <input type="hidden" id="pbEditingId" value="">

          <div class="form-grid">
            <div>
              <label for="pbDate">Data</label>
              <input type="date" id="pbDate" required>
            </div>
            <div>
              <label for="pbName">Esercizio / Movimento</label>
              <input type="text" id="pbName" placeholder="es. Front Squat" required>
            </div>
            <div>
              <label for="pbContextType">Tipo Struttura / WOD</label>
              <select id="pbContextType">
                <option value="Forza Classica">Forza Classica (Set/Reps)</option>
                <option value="EMOM">EMOM</option>
                <option value="E2MOM">E2MOM</option>
                <option value="E3MOM">E3MOM</option>
                <option value="Metcon / AMRAP">All'interno di un Metcon</option>
                <option value="Complex Pesante">Complex Pesante</option>
              </select>
            </div>
          </div>

          <div id="emomTypeSection" style="display: none; margin-bottom: 12px;">
            <label for="pbEmomSubtype">Tipo di EMOM specifico (Se diverso)</label>
            <input type="text" id="pbEmomSubtype" placeholder="es. E1MOM, E4MOM">
          </div>

          <div class="form-grid">
            <div>
              <label for="pbRounds">Round / Set Totali</label>
              <input type="text" id="pbRounds" placeholder="es. 5 rds o 5 set" value="5">
            </div>
            <div>
              <label id="repsLabel" for="pbReps">Ripetizioni (per round)</label>
              <input type="number" id="pbReps" min="1" value="3" required>
              <input type="text" id="pbRepsVariable" placeholder="es. 5-4-3-2-1" style="display: none;">
              
              <label class="checkbox-container">
                <input type="checkbox" id="pbIsVariableReps">
                <span class="checkbox-label">Rep a scalare / variabili</span>
              </label>
            </div>
            <div>
              <label for="pbIsConstant">Andamento Carico</label>
              <select id="pbIsConstant">
                <option value="yes">Peso costante</option>
                <option value="no">Carico variabile</option>
              </select>
            </div>
          </div>

          <div class="form-grid">
            <div>
              <label id="weightLabel" for="pbWeight">Peso Unico (kg)</label>
              <input type="number" id="pbWeight" step="0.5" min="0" placeholder="85" required>
            </div>
            <div style="background: rgba(0,0,0,0.15); padding: 8px 12px; border-radius: 8px; text-align: center;">
              <span id="previewLabel" style="font-size: 11px; color: var(--chalk-dim); text-transform: uppercase; display: block;">Stima Teorica 1-RM</span>
              <div id="pbPreviewOneRM" style="font-family: 'Space Mono', monospace; color: var(--yellow); font-size: 18px; font-weight: bold; margin-top: 2px;">-- kg</div>
            </div>
          </div>

          <div id="variableWeightSection" style="display: none; margin-bottom: 12px;">
            <label for="pbWeightDetails">Annotazione pesi round per round</label>
            <textarea id="pbWeightDetails" placeholder="es. 70, 75, 80, 85, 85"></textarea>
          </div>

          <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 10px;">
            <button type="submit" id="pbSubmitBtn" class="primary btn-yellow">Salva nei Massimali</button>
            <button type="button" id="pbCancelEditBtn" class="ghost">Annulla Modifica</button>
          </div>
        </form>
      </div>

      <div class="board">
        <h2><span class="dot yellow"></span>Storico Massimali</h2>
        <div class="table-responsive-container">
          <div id="globalPrTableContainer"></div>
        </div>
      </div>
    </section>
  </main>
</div>

<script>
    (function(){
      const SUPABASE_URL = "https://jyejxdxwrlifdgdoxnkx.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5ZWp4ZHh3cmxpZmRnZG94bmt4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5MzMwNjEsImV4cCI6MjA5OTUwOTA2MX0.OfR-joJS_eq0nJnarlR22yapu0foPRRTSp2mrnyzcl8";
      
      let supabase = null;
      if(window.supabase && !SUPABASE_URL.includes("XYZ_IL_TUO_ID")) {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      }
    
      let state = { runs: [], wods: [], pbs: [] };
    
      const $ = (sel, ctx) => (ctx||document).querySelector(sel);
      const $$ = (sel, ctx) => Array.from((ctx||document).querySelectorAll(sel));
    
      function todayStr(){ return new Date().toISOString().slice(0,10); }
      function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
    
      function fmtDate(iso){
        if(!iso) return '&mdash;';
        const d = new Date(iso + 'T00:00:00');
        return d.toLocaleDateString('it-IT', { day:'2-digit', month:'short' });
      }

      function calculateOneRM(weight, reps) {
        if (!weight) return 0;
        if (!reps || isNaN(reps) || reps <= 1) return weight;
        return weight * (1 + (reps / 30));
      }
    
      /* ---------- TABS NAVIGATION ---------- */
      $$('.tab').forEach(tabButton => {
        tabButton.addEventListener('click', () => {
          $$('.tab').forEach(t => t.classList.remove('active'));
          $$('.tab-panel').forEach(p => p.classList.remove('active'));
          
          tabButton.classList.add('active');
          const targetPanelId = 'tab-' + tabButton.getAttribute('data-tab');
          const panel = $('#' + targetPanelId);
          if (panel) panel.classList.add('active');
          
          if(tabButton.getAttribute('data-tab') === 'stats'){ renderRunStats(); }
          if(tabButton.getAttribute('data-tab') === 'massimali'){ resetPbForm(); renderGlobalPrTable(); }
          if(tabButton.getAttribute('data-tab') === 'crossfit'){ resetWodForm(); renderWods(); }
        });
      });
    
      async function loadState(){
        try{
          if(!supabase) return;
          const { data: runsData } = await supabase.from('runs').select('*').order('date', { ascending: false });
          const { data: wodsData } = await supabase.from('wods').select('*').order('date', { ascending: false });
          let pbsData = [];
          try {
            const { data } = await supabase.from('pbs').select('*').order('date', { ascending: false });
            pbsData = data || [];
          } catch(e) { console.warn("Tabella pbs assente."); }
    
          state.runs = runsData || [];
          state.wods = wodsData || [];
          state.pbs = pbsData || [];
        }catch(e){ console.error(e); }
      }
    
      /* ---------- CORSA ---------- */
      const runForm = $('#runForm');
      if($('#runDate')) $('#runDate').value = todayStr();
    
      if(runForm) {
        runForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const entry = {
            id: uid(), date: $('#runDate').value,
            km: parseFloat($('#runKm').value), pace: $('#runPace').value.trim(),
            hr: $('#runHr').value ? parseInt($('#runHr').value) : null,
            cal: $('#runCal').value ? parseInt($('#runCal').value) : null
          };
          try {
            if(supabase) {
              const { error } = await supabase.from('runs').insert([entry]);
              if(error) throw error;
            }
            state.runs.push(entry);
            renderRuns();
            runForm.reset();
            $('#runDate').value = todayStr();
          } catch(err) {
            alert("Errore Supabase:\n" + err.message);
          }
        });
      }
    
      function renderRuns(){
        const list = $('#runList'); if(!list) return;
        const sorted = [...state.runs].sort((a,b) => b.date.localeCompare(a.date));
        if(sorted.length === 0){
          list.innerHTML = '<div class="empty-state">Nessuna corsa registrata.</div>'; return;
        }
        list.innerHTML = sorted.map(r => `
          <div class="entry">
            <div class="entry-top">
              <span class="entry-date" style="color: var(--orange); font-weight:600;">${fmtDate(r.date)}</span>
              <button class="icon-btn" data-delete-run="${r.id}">&times;</button>
            </div>
            <div class="entry-stats">
              <div><span class="stat-label">Km</span>${r.km ?? '&mdash;'}</div>
              <div><span class="stat-label">Passo</span>${r.pace || '&mdash;'}</div>
              <div><span class="stat-label">Battiti</span>${r.hr ?? '&mdash;'}</div>
              <div><span class="stat-label">Calorie</span>${r.cal ?? '&mdash;'}</div>
            </div>
          </div>
        `).join('');
    
        $$('[data-delete-run]', list).forEach(btn => {
          btn.addEventListener('click', async () => {
            const idToDelete = btn.dataset.deleteRun;
            if(supabase) await supabase.from('runs').delete().eq('id', idToDelete);
            state.runs = state.runs.filter(r => r.id !== idToDelete);
            renderRuns();
          });
        });
      }
    
      /* ---------- CROSSFIT MULTI-WOD JSONB ---------- */
      const wodForm = $('#wodForm');
      const wodBlocksContainer = $('#wodBlocksContainer');
      if($('#wodDate')) $('#wodDate').value = todayStr();

      function exerciseRowTemplateWod(blockId, initialName='', initialNote='') {
        const div = document.createElement('div');
        div.className = 'exercise-row';
        div.innerHTML = `
          <div><input type="text" class="ex-name" placeholder="Movimento" value="${initialName}"></div>
          <div><input type="text" class="ex-note" placeholder="Note/Carico" value="${initialNote}"></div>
          <button type="button" class="icon-btn" data-remove-ex>&times;</button>
        `;
        div.querySelector('[data-remove-ex]').addEventListener('click', () => { div.remove(); });
        return div;
      }

      function wodBlockTemplate(initialType='fortime', initialDesc='', initialMovements=[]) {
        const blockId = uid();
        const div = document.createElement('div');
        div.className = 'wod-block';
        div.setAttribute('data-block-id', blockId);
        div.innerHTML = `
          <div class="wod-block-header">
            <select class="wod-type-select" style="max-width:140px; padding:6px 8px; font-size:14px;">
              <option value="fortime" ${initialType === 'fortime' ? 'selected' : ''}>For Time</option>
              <option value="amrap" ${initialType === 'amrap' ? 'selected' : ''}>AMRAP</option>
              <option value="emom" ${initialType === 'emom' ? 'selected' : ''}>EMOM</option>
              <option value="chipper" ${initialType === 'chipper' ? 'selected' : ''}>Chipper / Altro</option>
            </select>
            <button type="button" class="remove-block-btn">&times; Rimuovi blocco</button>
          </div>
          <div style="margin-bottom:8px;">
            <textarea class="wod-desc-textarea" placeholder="Struttura del WOD (es. 21-15-9... o punteggio)" style="font-size:14px; min-height:50px;"></textarea>
          </div>
          <div>
            <div class="ex-rows-container"></div>
            <button type="button" class="ghost add-ex-row-btn" style="margin-top:4px; padding:6px; font-size:12px;">+ Aggiungi Movimento</button>
          </div>
        `;
        
        div.querySelector('.wod-desc-textarea').value = initialDesc;

        const exRows = div.querySelector('.ex-rows-container');
        initialMovements.forEach(ex => exRows.appendChild(exerciseRowTemplateWod(blockId, ex.name, ex.note)));
        if(!initialMovements.length) exRows.appendChild(exerciseRowTemplateWod(blockId));

        div.querySelector('.add-ex-row-btn').addEventListener('click', () => { exRows.appendChild(exerciseRowTemplateWod(blockId)); });
        div.querySelector('.remove-block-btn').addEventListener('click', () => { if($$('.wod-block').length > 1) div.remove(); });
        return div;
      }

      if($('#addWodBlockBtn')) {
        $('#addWodBlockBtn').addEventListener('click', () => { wodBlocksContainer.appendChild(wodBlockTemplate()); });
      }

      function resetWodForm() {
        wodForm.reset();
        $('#wodEditingId').value = '';
        $('#wodDate').value = todayStr();
        $('#wodNotes').value = '';
        $('#wodFormTitle').innerHTML = '<span class="dot teal"></span>Nuova Sessione CrossFit';
        $('#wodSubmitBtn').textContent = 'Salva Sessione';
        $('#wodCancelEditBtn').style.display = 'none';
        wodBlocksContainer.innerHTML = '';
        wodBlocksContainer.appendChild(wodBlockTemplate());
      }
      if($('#wodCancelEditBtn')) $('#wodCancelEditBtn').addEventListener('click', resetWodForm);

      if(wodForm) {
        wodForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          
          const multiWodsData = $$('.wod-block').map(block => {
            const movements = $$('.exercise-row', block).map(row => ({
              name: row.querySelector('.ex-name').value.trim(),
              note: row.querySelector('.ex-note').value.trim()
            })).filter(m => m.name);

            return {
              type: block.querySelector('.wod-type-select').value,
              description: block.querySelector('.wod-desc-textarea').value.trim(),
              movements: movements
            };
          });

          const editingId = $('#wodEditingId').value;
          const isEditMode = editingId !== '';

          const payload = {
            id: isEditMode ? editingId : uid(),
            date: $('#wodDate').value,
            notes: $('#wodNotes').value.trim(),
            exercises: multiWodsData,
            type: multiWodsData[0]?.type || 'fortime', 
            description: multiWodsData[0]?.description || '',
            result: null
          };

          try {
            if(supabase) {
              let error;
              if(isEditMode) {
                const res = await supabase.from('wods').update(payload).eq('id', editingId);
                error = res.error;
              } else {
                const res = await supabase.from('wods').insert([payload]);
                error = res.error;
              }
              if(error) throw error;
            }

            if(isEditMode) {
              state.wods = state.wods.map(w => w.id === editingId ? payload : w);
            } else {
              state.wods.push(payload);
            }
            resetWodForm();
            renderWods();
          } catch(err) {
            alert("Errore salvataggio:\n" + err.message);
          }
        });
      }

      function renderWods(){
        const list = $('#wodList'); if(!list) return;
        const sorted = [...state.wods].sort((a,b) => b.date.localeCompare(a.date));
        if(!sorted.length){ list.innerHTML = '<div class="empty-state">Nessun allenamento CrossFit.</div>'; return; }
        
        list.innerHTML = sorted.map(session => {
          const blocks = Array.isArray(session.exercises) ? session.exercises : [{ type: session.type, description: session.description, movements: [] }];
          
          const blocksHtml = blocks.map(b => `
            <div class="single-wod-display">
              <div><span class="badge ${b.type}">${b.type}</span></div>
              ${b.description ? `<div class="wod-desc">${b.description}</div>` : ''}
              ${b.movements && b.movements.length ? `
                <ul class="exercise-list">
                  ${b.movements.map(m => `<li><span class="ex-name">${m.name}</span> ${m.note ? `<span class="ex-note">(${m.note})</span>` : ''}</li>`).join('')}
                </ul>
              ` : ''}
            </div>
          `).join('');

          return `
            <div class="entry">
              <div class="entry-top">
                <span class="entry-date" style="font-size:15px; font-weight:600; color:var(--teal);">${fmtDate(session.date)}</span>
                <div>
                  <button class="icon-btn edit-btn" data-edit-id="${session.id}">✏️</button>
                  <button class="icon-btn" data-delete-id="${session.id}">&times;</button>
                </div>
              </div>
              <div>${blocksHtml}</div>
              ${session.notes ? `<div style="margin-top:8px; font-size:12px; color:var(--chalk-dim); border-top:1px dashed var(--line); padding-top:4px;">Note: ${session.notes}</div>` : ''}
            </div>
          `;
        }).join('');

        $$('[data-edit-id]', list).forEach(btn => {
          btn.addEventListener('click', () => {
            const session = state.wods.find(w => w.id === btn.dataset.editId);
            if(!session) return;

            $('#wodEditingId').value = session.id;
            $('#wodDate').value = session.date;
            $('#wodNotes').value = session.notes || '';

            wodBlocksContainer.innerHTML = '';
            const blocks = Array.isArray(session.exercises) ? session.exercises : [{ type: session.type, description: session.description, movements: [] }];
            
            blocks.forEach(b => {
              wodBlocksContainer.appendChild(wodBlockTemplate(b.type, b.description, b.movements));
            });

            $('#wodFormTitle').innerHTML = '<span class="dot teal"></span>Modifica Sessione';
            $('#wodSubmitBtn').textContent = 'Aggiorna Sessione';
            $('#wodCancelEditBtn').style.display = 'block';
            $('#wodFormTitle').scrollIntoView({ behavior: 'smooth' });
          });
        });

        $$('[data-delete-id]', list).forEach(btn => {
          btn.addEventListener('click', async () => {
            const id = btn.dataset.deleteId;
            if(supabase) await supabase.from('wods').delete().eq('id', id);
            state.wods = state.wods.filter(w => w.id !== id);
            renderWods();
          });
        });
      }

      /* ---------- MASSIMALI ---------- */
      const pbManualForm = $('#pbManualForm');
      if($('#pbDate')) $('#pbDate').value = todayStr();

      function syncFormFieldsVisibility() {
        const emomSection = $('#emomTypeSection');
        const contextValue = $('#pbContextType').value;
        if(contextValue === 'EMOM') {
          emomSection.style.display = 'block';
        } else {
          emomSection.style.display = 'none';
        }

        const variableSection = $('#variableWeightSection');
        const weightLabel = $('#weightLabel');
        if($('#pbIsConstant').value === 'no') {
          variableSection.style.display = 'block';
          weightLabel.textContent = "Carico Max Raggiunto (kg)";
        } else {
          variableSection.style.display = 'none';
          weightLabel.textContent = "Peso Unico (kg)";
        }

        const isVariableReps = $('#pbIsVariableReps').checked;
        const pbReps = $('#pbReps');
        const pbRepsVariable = $('#pbRepsVariable');
        const repsLabel = $('#repsLabel');
        const previewLabel = $('#previewLabel');

        if(isVariableReps) {
          pbReps.style.display = 'none';
          pbReps.removeAttribute('required');
          pbRepsVariable.style.display = 'block';
          pbRepsVariable.setAttribute('required', 'required');
          repsLabel.textContent = "Schema Reps (testo)";
          previewLabel.textContent = "Nota su Carico Massimo";
        } else {
          pbReps.style.display = 'block';
          pbReps.setAttribute('required', 'required');
          pbRepsVariable.style.display = 'none';
          pbRepsVariable.removeAttribute('required');
          repsLabel.textContent = "Ripetizioni (per round)";
          previewLabel.textContent = "Stima Teorica 1-RM";
        }
      }

      if($('#pbContextType')) $('#pbContextType').addEventListener('change', syncFormFieldsVisibility);
      if($('#pbIsConstant')) $('#pbIsConstant').addEventListener('change', syncFormFieldsVisibility);
      if($('#pbIsVariableReps')) $('#pbIsVariableReps').addEventListener('change', syncFormFieldsVisibility);

      function updateManualPbPreview() {
        const isVariableReps = $('#pbIsVariableReps').checked;
        const weight = parseFloat($('#pbWeight').value) || 0;
        const preview = $('#pbPreviewOneRM');
        if(!preview) return;

        if(isVariableReps) {
          preview.textContent = weight > 0 ? `${weight.toFixed(1)} kg` : '-- kg';
        } else {
          const reps = parseInt($('#pbReps').value) || 1;
          const estimated = calculateOneRM(weight, reps);
          preview.textContent = estimated > 0 ? `${estimated.toFixed(1)} kg` : '-- kg';
        }
      }
      if($('#pbWeight')) $('#pbWeight').addEventListener('input', updateManualPbPreview);
      if($('#pbReps')) $('#pbReps').addEventListener('input', updateManualPbPreview);
      if($('#pbIsVariableReps')) $('#pbIsVariableReps').addEventListener('change', updateManualPbPreview);

      function resetPbForm() {
        pbManualForm.reset();
        $('#pbEditingId').value = '';
        $('#pbDate').value = todayStr();
        $('#pbFormTitle').innerHTML = '<span class="dot yellow"></span>Nuovo Record / Forza';
        $('#pbSubmitBtn').textContent = 'Salva nei Massimali';
        $('#pbCancelEditBtn').style.display = 'none';
        if($('#pbPreviewOneRM')) $('#pbPreviewOneRM').textContent = '-- kg';
        syncFormFieldsVisibility();
      }

      if($('#pbCancelEditBtn')) $('#pbCancelEditBtn').addEventListener('click', resetPbForm);

      if(pbManualForm) {
        pbManualForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          
          let structureType = $('#pbContextType').value;
          if(structureType === 'EMOM' && $('#pbEmomSubtype').value.trim() !== '') {
            structureType = `${$('#pbEmomSubtype').value.trim().toUpperCase()}`;
          }

          const editingId = $('#pbEditingId').value;
          const isEditMode = editingId !== '';
          const isVariableReps = $('#pbIsVariableReps').checked;

          const entry = {
            id: isEditMode ? editingId : uid(), 
            date: $('#pbDate').value, 
            name: $('#pbName').value.trim(),
            weight: parseFloat($('#pbWeight').value), 
            reps: isVariableReps ? 0 : parseInt($('#pbReps').value),
            context_type: structureType,
            context_details: `Struttura: ${$('#pbRounds').value || '1'}`,
            is_constant: $('#pbIsConstant').value === 'yes',
            weight_details: isVariableReps ? $('#pbRepsVariable').value.trim() : ($('#pbIsConstant').value === 'no' ? $('#pbWeightDetails').value.trim() : 'Carico Costante')
          };

          if(supabase) { 
            try { 
              let error;
              if(isEditMode) {
                const res = await supabase.from('pbs').update(entry).eq('id', editingId);
                error = res.error;
              } else {
                const res = await supabase.from('pbs').insert([entry]); 
                error = res.error;
              }
              if(error) throw error;
            } catch(err){ 
              alert("Errore Supabase:\n" + err.message);
            } 
          }
          
          if(isEditMode) {
            state.pbs = state.pbs.map(p => p.id === editingId ? entry : p);
          } else {
            state.pbs.push(entry);
          }

          resetPbForm();
          renderGlobalPrTable();
        });
      }

      function renderGlobalPrTable() {
        const container = $('#globalPrTableContainer'); if(!container) return;
        const sortedPrs = [...state.pbs].sort((a,b) => b.date.localeCompare(a.date));
        if(sortedPrs.length === 0) {
          container.innerHTML = '<div class="empty-state">Nessun massimale.</div>'; return;
        }
        container.innerHTML = `
          <table class="pr-table">
            <thead>
              <tr>
                <th>Esercizio</th>
                <th>Carico Reale</th>
                <th>Stima 1-RM</th>
                <th>Struttura</th>
                <th>Data</th>
                <th>Azioni</th>
              </tr>
            </thead>
            <tbody>
              ${sortedPrs.map(item => {
                const isVar = item.reps === 0;
                const est1RM = isVar ? item.weight : calculateOneRM(item.weight, item.reps);
                const displayReps = isVar ? `<span style="font-size:11px; color:var(--yellow); font-weight:500;">(${item.weight_details})</span>` : `@ ${item.reps} rep`;
                
                return `
                  <tr>
                    <td><strong>${item.name}</strong></td>
                    <td class="weight-cell">
                      ${item.weight} kg ${displayReps}
                      ${(!item.is_constant && !isVar) ? `<span class="info-context" style="color:var(--yellow); font-style:italic;">${item.weight_details || ''}</span>` : ''}
                    </td>
                    <td class="rm-cell">${isVar ? 'Complex / Var' : est1RM.toFixed(1) + ' kg'}</td>
                    <td class="date-cell">
                      <span style="color:var(--yellow); font-weight:500;">${item.context_type}</span>
                      <span class="info-context">${item.context_details || ''}</span>
                    </td>
                    <td class="date-cell">${fmtDate(item.date)}</td>
                    <td style="white-space: nowrap;">
                      <button class="icon-btn edit-btn" data-edit-pb-id="${item.id}">✏️</button>
                      <button class="icon-btn" data-delete-pb-id="${item.id}">&times;</button>
                    </td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        `;

        $$('[data-edit-pb-id]', container).forEach(btn => {
          btn.addEventListener('click', () => {
            const item = state.pbs.find(p => p.id === btn.dataset.editPbId);
            if(!item) return;

            $('#pbEditingId').value = item.id;
            $('#pbDate').value = item.date;
            $('#pbName').value = item.name;
            $('#pbWeight').value = item.weight;
            
            const matchRounds = (item.context_details || '').match(/Struttura:\s*(.*)/);
            $('#pbRounds').value = matchRounds ? matchRounds[1] : '5';

            $('#pbIsConstant').value = item.is_constant ? 'yes' : 'no';

            if(item.reps === 0) {
              $('#pbIsVariableReps').checked = true;
              $('#pbRepsVariable').value = item.weight_details;
              $('#pbWeightDetails').value = '';
            } else {
              $('#pbIsVariableReps').checked = false;
              $('#pbReps').value = item.reps;
              $('#pbWeightDetails').value = !item.is_constant ? item.weight_details : '';
            }

            const standardTypes = ["Forza Classica", "EMOM", "E2MOM", "E3MOM", "Metcon / AMRAP", "Complex Pesante"];
            if (standardTypes.includes(item.context_type)) {
              $('#pbContextType').value = item.context_type;
              $('#pbEmomSubtype').value = '';
            } else {
              $('#pbContextType').value = 'EMOM';
              $('#pbEmomSubtype').value = item.context_type;
            }

            $('#pbFormTitle').innerHTML = '<span class="dot yellow"></span>Modifica Record';
            $('#pbSubmitBtn').textContent = 'Aggiorna Carico';
            $('#pbCancelEditBtn').style.display = 'block';
            
            syncFormFieldsVisibility();
            updateManualPbPreview();

            $('#pbFormTitle').scrollIntoView({ behavior: 'smooth' });
          });
        });

        $$('[data-delete-pb-id]', container).forEach(btn => {
          btn.addEventListener('click', async () => {
            const idToDel = btn.dataset.deletePbId;
            if(idToDel === $('#pbEditingId').value) resetPbForm();
            if(supabase) { try { await supabase.from('pbs').delete().eq('id', idToDel); } catch(e){} }
            state.pbs = state.pbs.filter(p => p.id !== idToDel);
            renderGlobalPrTable();
          });
        });
      }

      /* ---------- STATISTICHE CORSA ---------- */
      function buildLineChart(points){
        const width = 600; const height = 180; const padding = 34; 
        const plotW = width - padding * 2; const plotH = height - padding * 2;
        if(points.length === 0) return '';
        const ys = points.map(p => p.y);
        let yMin = Math.min(...ys); let yMax = Math.max(...ys);
        if(yMin === yMax){ yMin -= 1; yMax += 1; }
        const xStep = points.length > 1 ? plotW / (points.length - 1) : 0;
        function yPixel(v){ const norm = (v - yMin) / (yMax - yMin); return padding + plotH - norm * plotH; }
        const coords = points.map((p, i) => [padding + i * xStep, yPixel(p.y)]);
        const pathD = coords.map((c, i) => (i === 0 ? 'M' : 'L') + c[0].toFixed(1) + ',' + c[1].toFixed(1)).join(' ');
        const bestIdx = ys.indexOf(Math.max(...ys));
        const dots = coords.map((c, i) => `
          <circle cx="${c[0].toFixed(1)}" cy="${c[1].toFixed(1)}" r="${i === bestIdx ? 5 : 3.5}" fill="${i === bestIdx ? '#F2C14E' : 'var(--orange)'}"></circle>`).join('');
        return `
          <svg viewBox="0 0 ${width} ${height}" width="100%" height="${height}" style="overflow:visible;">
            <line x1="${padding}" y1="${padding}" x2="${padding}" y2="${padding+plotH}" stroke="var(--line)" stroke-width="1"/>
            <line x1="${padding}" y1="${padding+plotH}" x2="${padding+plotW}" y2="${padding+plotH}" stroke="var(--line)" stroke-width="1"/>
            <text x="${padding-6}" y="${padding+4}" font-size="10" fill="var(--chalk-dim)" text-anchor="end" font-family="Space Mono, monospace">${yMax.toFixed(1)}k</text>
            <text x="${padding-6}" y="${padding+plotH+4}" font-size="10" fill="var(--chalk-dim)" text-anchor="end" font-family="Space Mono, monospace">${yMin.toFixed(1)}k</text>
            <path d="${pathD}" fill="none" stroke="var(--orange)" stroke-width="2"/>
            ${dots}
          </svg>
        `;
      }

      function renderRunStats(){
        const container = $('#runStats'); const chartContainer = $('#runChartContainer'); if(!container) return;
        if(state.runs.length === 0){
          container.innerHTML = '<div class="empty-state">Nessuna statistica disponibile.</div>';
          if(chartContainer) chartContainer.innerHTML = ''; return;
        }
        const totalKm = state.runs.reduce((sum, r) => sum + (r.km || 0), 0);
        const longestRun = Math.max(...state.runs.map(r => r.km || 0));
        container.innerHTML = `
          <div class="stat-cards">
            <div class="stat-card"><span class="big">${totalKm.toFixed(1)}</span><span class="lbl">Km Totali</span></div>
            <div class="stat-card"><span class="big">${state.runs.length}</span><span class="lbl">Sessioni</span></div>
            <div class="stat-card"><span class="big">${longestRun.toFixed(1)}</span><span class="lbl">Max Km</span></div>
          </div>`;
        const chartPoints = state.runs.map(r => ({ x: r.date, y: r.km })).sort((a,b) => a.x.localeCompare(b.x));
        if(chartContainer && chartPoints.length >= 2){
          chartContainer.innerHTML = `<div class="chart-wrap">${buildLineChart(chartPoints)}</div>`;
        } else if (chartContainer) {
          chartContainer.innerHTML = '<div class="empty-state">Inserisci almeno 2 corse per sbloccare il grafico.</div>';
        }
      }
    
      /* ---------- INIT ---------- */
      async function init(){
        if(wodBlocksContainer) {
          wodBlocksContainer.innerHTML = '';
          wodBlocksContainer.appendChild(wodBlockTemplate());
        }
        renderRuns(); renderWods(); renderGlobalPrTable();
        await loadState(); 
        renderRuns(); renderWods(); renderGlobalPrTable(); renderRunStats();
      }
      init();
    })();
</script>
</body>
</html>
